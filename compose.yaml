services:
  app:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    environment: { DB_HOST: mysql }
    depends_on: { mysql: { condition: service_healthy } }
    volumes: [".:/var/www/html", "vendor:/var/www/html/vendor"]
  queue:
    build: .
    command: php artisan queue:work database --queue=audit,statements,reporting,notifications,default --sleep=1 --tries=3 --timeout=90
    env_file: .env
    environment: { DB_HOST: mysql }
    depends_on: { mysql: { condition: service_healthy } }
    volumes: [".:/var/www/html", "vendor:/var/www/html/vendor"]
  mysql:
    image: mysql:8.4
    ports: ["3306:3306"]
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ledgerflow}
      MYSQL_USER: ${DB_USERNAME:-ledgerflow}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root-secret}
    healthcheck: { test: ["CMD", "mysqladmin", "ping", "-h", "localhost"], interval: 5s, timeout: 5s, retries: 20 }
    volumes: ["mysql-data:/var/lib/mysql"]
volumes: { mysql-data: {}, vendor: {} }
